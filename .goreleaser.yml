version: 2

project_name: steamgifts-bot

before:
  hooks:
    - go mod tidy

builds:
  - id: steamgifts-bot
    main: ./cmd/steamgifts-bot
    binary: steamgifts-bot
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .ShortCommit }}
      - -X main.date={{ .Date }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    overrides:
      - goos: windows
        ldflags:
          - -s -w -H windowsgui
          - -X main.version={{ .Version }}
          - -X main.commit={{ .ShortCommit }}
          - -X main.date={{ .Date }}

archives:
  - id: default
    formats: ["tar.gz"]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        formats: ["zip"]
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md
      - config.example.yml
      - src: docs/README-FIRST.txt
        dst: README-FIRST.txt
        info:
          mode: 0644

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  use: github
  sort: asc
  groups:
    - title: Features
      regexp: "^.*feat[(\\w)]*:+.*$"
      order: 0
    - title: Fixes
      regexp: "^.*fix[(\\w)]*:+.*$"
      order: 1
    - title: Others
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  draft: false
  prerelease: auto
  github:
    owner: heinrichb
    name: steamgifts-bot
