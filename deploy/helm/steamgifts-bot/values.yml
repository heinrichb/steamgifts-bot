image:
  repository: ghcr.io/heinrichb/steamgifts-bot
  tag: latest
  pullPolicy: IfNotPresent

# Inline config.yml content — or use existingConfigSecret instead.
config: |
  defaults:
    min_points: 50
    pause_minutes: 15
    max_pages: 3
  filters:
    - wishlist
    - group
    - multicopy
    - recommended
    - new
    - all
  accounts:
    - name: primary
      cookie: "REPLACE_ME"

# Use an existing Secret for config instead of inline.
# existingConfigSecret: steamgifts-bot-config

metrics:
  enabled: false
  port: 9090

dashboard:
  enabled: false
  port: 8080

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    memory: 128Mi

persistence:
  enabled: true
  size: 100Mi
  storageClass: ""
