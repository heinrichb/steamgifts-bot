apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    app.kubernetes.io/name: steamgifts-bot
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: steamgifts-bot
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: steamgifts-bot
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        fsGroup: 65532
      containers:
        - name: bot
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - run
            - --config
            - /config/config.yml
            - --state-file
            - /state/state.json
            {{- if .Values.metrics.enabled }}
            - --metrics-addr
            - ":{{ .Values.metrics.port }}"
            {{- end }}
            {{- if .Values.dashboard.enabled }}
            - --dashboard-addr
            - ":{{ .Values.dashboard.port }}"
            {{- end }}
          {{- if or .Values.metrics.enabled .Values.dashboard.enabled }}
          ports:
            {{- if .Values.metrics.enabled }}
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
              protocol: TCP
            {{- end }}
            {{- if .Values.dashboard.enabled }}
            - name: dashboard
              containerPort: {{ .Values.dashboard.port }}
              protocol: TCP
            {{- end }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: state
              mountPath: /state
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
      volumes:
        - name: config
          secret:
            {{- if .Values.existingConfigSecret }}
            secretName: {{ .Values.existingConfigSecret }}
            {{- else }}
            secretName: {{ .Release.Name }}-config
            {{- end }}
        - name: state
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-state
          {{- else }}
          emptyDir: {}
          {{- end }}
