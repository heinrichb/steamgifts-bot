{{- if not .Values.existingConfigSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-config
  labels:
    app.kubernetes.io/name: steamgifts-bot
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  config.yml: |
    {{- .Values.config | nindent 4 }}
{{- end }}
